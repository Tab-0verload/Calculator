<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: auto;
            margin: 0;
            background-color: #f4f4f4;
            padding-top: 10px;
        }

        .calculator {
            width: 250px;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .display {
            width: 230px;
            height: 40px;
            font-size: 2em;
            text-align: right;
            padding: 10px;
            background-color: #f0f0f0;
            border: none;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .button {
            padding: 20px;
            font-size: 1.5em;
            text-align: center;
            background-color: #f0f0f0;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .button:hover {
            background-color: #ddd;
        }

        .button:active {
            background-color: #ccc;
        }

        .button-clear {
            background-color: #f96d6d;
            color: white;
        }

        .button-equal {
            background-color: #4CAF50;
            color: white;
        }

        .button-operator {
            background-color: #f9a825;
            color: white;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" class="display" disabled>
    <div class="buttons">
        
        <button class="button button-operator" onclick="appendToDisplay('+')">+</button>
        <button class="button button-operator" onclick="appendToDisplay('-')">-</button>
        <button class="button button-operator" onclick="appendToDisplay('/')">/</button>
        <button class="button button-operator" onclick="appendToDisplay('*')">*</button>
        
        <button class="button" onclick="appendToDisplay('1')">1</button>
        <button class="button" onclick="appendToDisplay('2')">2</button>
        <button class="button" onclick="appendToDisplay('3')">3</button>

        <button class="button" onclick="appendToDisplay('4')">4</button>
        <button class="button" onclick="appendToDisplay('5')">5</button>
        <button class="button" onclick="appendToDisplay('6')">6</button>
        

        <button class="button" onclick="appendToDisplay('7')">7</button>
        <button class="button" onclick="appendToDisplay('8')">8</button>
        <button class="button" onclick="appendToDisplay('9')">9</button>

        <button class="button" onclick="appendToDisplay('0')">0</button>
        <button class="button" onclick="appendToDisplay('.')">.</button>

        <button class="button button-equal" onclick="calculateResult()">=</button>
        <button class="button button-clear" onclick="clearDisplay()">C</button>
        
        
        
    </div>
</div>

<script>
    function appendToDisplay(value) {
        document.getElementById('display').value += value;
    }

    function clearDisplay() {
        document.getElementById('display').value = '';
    }

    function calculateResult() {
        const expression = document.getElementById('display').value;
        try {
            document.getElementById('display').value = eval(expression);
        } catch (e) {
            document.getElementById('display').value = 'Ошибка';
        }
    }
</script>

</body>
</html>

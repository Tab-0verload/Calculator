<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькуляторы</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
            background-color: #00131c;
        }
        .container {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        .result {
            font-weight: bold;
            margin-top: 10px;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 5px;
            color: #2e7d32;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Калькулятор времени</h2>
    <label>Часы:</label>
    <input type="number" id="timeHours" oninput="calculateTime()">
    <label>Минуты:</label>
    <input type="number" id="timeMinutes" oninput="calculateTime()">
    <div class="result" id="timeResult">Введите данные</div>

    <h2>Процентный калькулятор</h2>
    <label>Число:</label>
    <input type="number" id="percentNumber" oninput="calculatePercent()">
    <label>Процент (%):</label>
    <input type="number" id="percentValue" oninput="calculatePercent()">
    <div class="result" id="percentResult">Введите данные</div>

</div>

<script>
    function calculateTime() {
        let hours = parseInt(document.getElementById("timeHours").value) || 0;
        let minutes = parseInt(document.getElementById("timeMinutes").value) || 0;

        // Проверим данные, чтобы они корректно вычислялись
        console.log(`Часы: ${hours}, Минуты: ${minutes}`);

        let totalMinutes = hours * 60 + minutes;
        let days = Math.floor(totalMinutes / 1440);
        let remainingHours = Math.floor((totalMinutes % 1440) / 60);
        let remainingMinutes = totalMinutes % 60;

        let now = new Date();
        now.setMinutes(now.getMinutes() + totalMinutes);
        let futureTime = now.toLocaleString();

        // Покажем результат на странице
        document.getElementById("timeResult").innerHTML = `Перевод: <b>${days}</b> д. <b>${remainingHours}</b> ч. <b>${remainingMinutes}</b> м.<br>Будет: <b>${futureTime}</b>`;
    }

    function calculatePercent() {
        let number = parseFloat(document.getElementById("percentNumber").value) || 0;
        let percent = parseFloat(document.getElementById("percentValue").value) || 0;

        // Проверим данные
        console.log(`Число: ${number}, Процент: ${percent}`);

        let result = (number * percent) / 100;
        document.getElementById("percentResult").innerHTML = `Результат: <b>${result}</b>`;
    }
</script>

</body>
</html>
